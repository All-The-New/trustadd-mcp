name: Deploy Trigger.dev Jobs

on:
  push:
    branches:
      - main
    paths:
      - "trigger/**"
      - "trigger.config.ts"
      - "server/**"
      - "shared/**"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Deploy Trigger.dev jobs
        run: npx trigger.dev@4.4.3 deploy
        env:
          TRIGGER_SECRET_KEY: ${{ secrets.TRIGGER_SECRET_KEY }}
